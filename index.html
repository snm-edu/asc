<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#10233f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>ヒューマン・アナトミー・アトラス2026 Demo</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="hero-copy">
          <p class="eyebrow">Smartphone Demo</p>
          <h1>ヒューマン・アナトミー・アトラス2026</h1>
          <p class="lede">
            スマホで回転・拡大しながら、入学前学習向けの解剖部位を確認できる試作版です。
          </p>
        </div>
        <div class="status-pill">1本指で回転 / 2本指で拡大・移動</div>
      </header>

      <main class="layout">
        <section class="viewer-shell">
          <div class="viewer-card">
            <div class="viewer-topbar">
              <span class="viewer-label">3Dビュー</span>
              <button id="resetView" class="secondary-button" type="button">
                視点リセット
              </button>
            </div>

            <section id="viewport" aria-label="3Dビュー">
              <div id="loadingNotice" class="notice">3Dデータを読み込み中...</div>
            </section>

            <div class="viewer-help">
              <span>タップ: 部位選択</span>
              <span>1本指: 回転</span>
              <span>2本指: 拡大・移動</span>
            </div>
          </div>
        </section>

        <aside class="info-panel">
          <section class="panel-section">
            <h2>表示設定</h2>
            <div class="field-grid">
              <label class="field">
                <span>学習領域</span>
                <select id="domainFilter">
                  <option value="all">すべて</option>
                  <option value="nursing">看護師</option>
                  <option value="orthoptist">視能訓練士</option>
                  <option value="dental">歯科衛生士</option>
                  <option value="clinical_engineering">臨床工学技士</option>
                </select>
              </label>

              <label class="field">
                <span>レイヤー</span>
                <select id="layerFilter">
                  <option value="all">すべて</option>
                  <option value="skeletal">骨格</option>
                  <option value="muscular">筋</option>
                  <option value="nervous">神経</option>
                  <option value="vascular">血管</option>
                  <option value="organs">臓器</option>
                  <option value="ophthalmic">眼</option>
                  <option value="dental">口腔・歯科</option>
                </select>
              </label>
            </div>

            <div class="action-row">
              <button id="toggleEn" class="secondary-button" type="button">
                英語名 OFF
              </button>
              <button id="quizButton" class="primary-button" type="button">
                クイズ開始
              </button>
            </div>
          </section>

          <section class="panel-section">
            <div class="section-head">
              <h2>選択部位</h2>
              <span class="mini-pill">同一人体モデル</span>
            </div>
            <p id="partName" class="part-name">未選択</p>
            <p id="partNameEn" class="part-name-en"></p>
            <p id="partDescription" class="muted">
              3Dビューの部位をタップすると、名称と説明が表示されます。
            </p>
          </section>

          <section class="panel-section">
            <h2>進捗</h2>
            <div class="stat-grid">
              <div class="stat-card">
                <span class="stat-label">学習時間</span>
                <strong id="learningTime">0分</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">クイズ正答率</span>
                <strong id="quizScore">-</strong>
              </div>
            </div>

            <div id="quizArea" class="quiz hidden">
              <p id="quizPrompt" class="quiz-prompt"></p>
              <div id="quizOptions" class="quiz-options"></div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
